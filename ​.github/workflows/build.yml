name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Unzip project files
      run: |
        if [ -f project_files.zip ]; then
          unzip project_files.zip -d .
          rm project_files.zip
        elif [ -f "apk create.zip" ]; then
          unzip "apk create.zip" -d .
          rm "apk create.zip"
        elif [ -f app.zip ]; then
          unzip app.zip -d app/
          rm app.zip
        fi

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
